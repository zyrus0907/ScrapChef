services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pantry_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
      POSTGRES_DB: pantry
    ports:
      - "5432:5432"
    volumes:
      - pantry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pantry_pgdata:
